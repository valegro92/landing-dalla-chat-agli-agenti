<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dalla chat agli Agenti — componi la tua cassetta</title>
<meta name="description" content="Co-progettiamo insieme la masterclass Dalla chat agli Agenti. Proponi il tuo caso, entra nel programma.">
<style>
  :root{color-scheme:light;--cream:#FAF6EF;--card:#FFFFFF;--ink:#20302B;--muted:#6B756F;--teal:#1F7A6D;--teal-d:#155A50;--amber:#E0892B;--amber-d:#7a4d12;--line:#E7E0D4;--soft:#F2ECE0;--err:#B4321F;
    --serif:Georgia,'Iowan Old Style','Times New Roman',serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--sans);line-height:1.6}
  .wrap{max-width:760px;margin:0 auto;padding:22px 18px 70px;position:relative;overflow:hidden}
  .kit{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 14px;position:sticky;top:10px;z-index:6;animation:slidedown .6s ease both}
  .kit .lab{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.04em;margin-right:4px}
  .slot{flex:1;display:flex;gap:9px;align-items:center;border:1px dashed var(--line);border-radius:12px;padding:9px 11px;opacity:.5;transition:all .35s}
  .slot.full{opacity:1;border-style:solid;border-color:var(--teal);background:#EEF6F3}
  .slot svg{width:20px;height:20px;color:var(--muted);flex:none}
  .slot.full svg{color:var(--teal)}
  .slot.pop{animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(.8)}45%{transform:scale(1.14)}100%{transform:scale(1)}}
  @keyframes slidedown{0%{opacity:0;transform:translateY(-14px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes fadeup{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes sheen{0%{opacity:0;transform:scale(.6)}60%{opacity:.5}100%{opacity:0;transform:scale(1.5)}}
  .slot b{font-size:13px;font-weight:600;display:block;line-height:1.2}
  .slot small{font-size:11px;color:var(--muted)}
  #stage{animation:fadeup .45s ease both}
  .kick{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);font-weight:700;margin-top:22px}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(28px,5vw,40px);line-height:1.12;margin:.3em 0 .3em;letter-spacing:-.01em}
  p.lead{font-size:17px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
  .choice{display:block;text-align:left;border:1px solid var(--line);background:#fff;border-radius:14px;padding:15px 16px;cursor:pointer;font-family:inherit;font-size:16px;color:var(--ink);transition:transform .12s,border-color .15s,box-shadow .15s}
  .choice:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 4px 14px rgba(31,122,109,.08)}
  .choice b{font-weight:600}.choice .sub{display:block;font-size:13px;color:var(--muted);margin-top:1px}
  .full-w{grid-column:1 / -1;border-style:dashed;color:var(--teal-d)}
  .stack{display:flex;flex-direction:column;gap:10px;margin-top:10px}
  .write{border:1px solid var(--amber);background:#FDF4E6;border-radius:14px;padding:16px;margin-top:14px}
  .write .wh{font-weight:600;color:var(--amber-d)}
  textarea{width:100%;min-height:64px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-family:inherit;font-size:15px;background:#fff;color:var(--ink);resize:vertical;margin-top:10px}
  .field{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:12px;font-family:inherit;font-size:15px;background:#fff;color:var(--ink)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .err{color:var(--err);font-size:14px;margin-top:10px;display:none}
  .consent{margin-top:16px;display:flex;flex-direction:column;gap:12px}
  .ck{display:flex;gap:10px;align-items:flex-start;font-size:14px;color:var(--ink);line-height:1.45}
  .ck input{margin-top:3px;width:18px;height:18px;flex:none;accent-color:var(--teal)}
  .ck a{color:var(--teal-d);font-weight:600}
  .ck .opt{color:var(--muted);font-weight:600}
  .btn{background:var(--teal);color:#fff;border:0;border-radius:12px;padding:13px 22px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .1s}
  .btn:hover{transform:translateY(-1px)}
  .btn.amber{background:var(--amber);color:#3a2a10}
  .btn.sm{padding:10px 16px;font-size:14px;margin-top:10px}
  .btn.ghost{background:transparent;color:var(--teal-d);border:1px solid var(--teal)}
  .row{display:flex;gap:10px;align-items:center;margin-top:22px;flex-wrap:wrap}
  .back{background:none;border:0;color:var(--muted);cursor:pointer;font-family:inherit;font-size:15px}
  .ba{border:1px solid var(--line);border-radius:14px;padding:16px 18px;background:#fff;margin-bottom:10px}
  .ba .l{font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
  .ba.before .l{color:var(--amber)}.ba.after .l{color:var(--teal)}
  .ba .t{font-size:18px;font-family:var(--serif);margin-top:3px}
  .arrowdn{text-align:center;color:var(--muted);font-size:22px;line-height:1;margin:-2px 0 8px}
  .tappa{display:inline-block;background:#E9F3F0;color:var(--teal-d);border-radius:99px;padding:7px 14px;font-size:14px;font-weight:600;margin-top:4px}
  .medalwrap{position:relative;display:flex;justify-content:center}
  .medalwrap::before{content:"";position:absolute;top:-6px;width:120px;height:120px;border-radius:99px;background:var(--teal);animation:sheen 1s ease .1s both}
  .medal{position:relative;width:96px;height:96px;border-radius:99px;background:radial-gradient(circle at 50% 38%,#2DB89A,#1F7A6D);color:#fff;display:flex;align-items:center;justify-content:center;margin:6px 0 14px;box-shadow:0 10px 24px rgba(31,122,109,.4);animation:pop .6s ease both}
  .medal svg{width:46px;height:46px}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;background:var(--ink);color:#fff;padding:11px 18px;border-radius:99px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;z-index:20}
  .toast.show{opacity:1}
  .card-soft{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:14px}
  .quote{font-family:var(--serif);font-size:20px;line-height:1.4}
  .foot{margin-top:34px;padding-top:16px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
  .foot a{color:var(--muted);text-decoration:underline}
  .conf{position:absolute;top:-10px;width:9px;height:14px;border-radius:2px;opacity:0;will-change:transform}
  @keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(620px) rotate(540deg)}}
  @media(max-width:560px){.two{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="kit" id="kit">
    <span class="lab">La tua cassetta</span>
    <div class="slot" data-k="0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg><span><b>Il banco</b><small>il tuo mondo</small></span></div>
    <div class="slot" data-k="1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg><span><b>Il problema</b><small>cosa risolvi</small></span></div>
    <div class="slot" data-k="2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="8" width="16" height="11" rx="3"/><path d="M12 4v4M8 13h.01M16 13h.01"/></svg><span><b>L'agente</b><small>la soluzione</small></span></div>
  </div>
  <div id="stage"></div>
</div>
<div class="toast" id="toast"><span id="toasttx"></span></div>
<script>
const PRIVACY_VER="v1-2026-06";
const ROLES=[
 {id:'amministrazione',label:'Amministrazione',sub:'conti, preventivi, scadenze'},
 {id:'commerciale',label:'Commerciale',sub:'clienti, offerte, follow-up'},
 {id:'marketing',label:'Marketing',sub:'contenuti, canali, campagne'},
 {id:'operations',label:'Operations',sub:'processi, report, documenti'},
 {id:'hr',label:'Persone / HR',sub:'selezione, onboarding'},
 {id:'studio',label:'Studio professionale',sub:'pratiche, norme, verbali'}
];
const PAINS={
 amministrazione:[
  {t:'Rincorrere pagamenti e solleciti',out:'Un agente che riconcilia gli scaduti e prepara i solleciti, col tuo tono.',tappa:'M3 · Saper delegare'},
  {t:'Rifare ogni preventivo da zero',out:'Un agente che monta il preventivo su misura dai tuoi listini.',tappa:'M3 · Saper delegare'},
  {t:'Mettere ordine tra scontrini e prima nota',out:'Dai a Claude foto e PDF: ti restituisce una prima nota ordinata.',tappa:'M2 · Saper dare contesto'},
  {t:'Le scadenze fiscali che incombono',out:'Un piccolo scadenzario che ti avvisa e prepara le bozze, fatto da te.',tappa:'M4 · Saper costruire'},
  {t:'Rimettere insieme i numeri ogni settimana',out:'Un report settimanale che si scrive da solo, da rivedere.',tappa:'M3 · Saper delegare'}
 ],
 commerciale:[
  {t:'Rincorrere i follow-up dopo gli incontri',out:'Un agente che, dopo ogni incontro, prepara e tiene i follow-up al posto tuo.',tappa:'M3 · Saper delegare'},
  {t:'Rifare ogni offerta da capo',out:'Un agente che genera l’offerta su misura dal profilo del cliente.',tappa:'M3 · Saper delegare'},
  {t:'Tenere il CRM aggiornato',out:'Un agente che trasforma le note della call in CRM aggiornato.',tappa:'M3 · Saper delegare'},

 ],
 marketing:[
  {t:'Riempire il calendario editoriale',out:'Un agente che pianifica un mese di contenuti in un’ora, con te.',tappa:'M3 · Saper delegare'},
  {t:'Riadattare lo stesso contenuto per ogni canale',out:'Un agente che declina un tuo post per LinkedIn, IG e blog.',tappa:'M3 · Saper delegare'},
  {t:'Scrivere la newsletter ogni volta da zero',out:'Un agente che monta la bozza dai tuoi materiali, nel tuo tono.',tappa:'M3 · Saper delegare'},

 ],

  {t:'Scrivere i report di stato ogni settimana',out:'Un agente che ti scrive il report settimanale, da rivedere.',tappa:'M3 · Saper delegare'},

  {t:'Mettere ordine tra file e documenti',out:'Un agente che ordina e rinomina le tue cartelle per te.',tappa:'M3 · Saper delegare'},

  {t:'Non perdere scadenze e monitoraggi',out:'Un’automazione che ogni mattina ti porta cosa scade e cosa cambia.',tappa:'M4 · Saper costruire'}
 ],
 hr:[

  {t:'Far partire l’onboarding di ognuno',out:'Un percorso di onboarding che si gestisce quasi da solo.',tappa:'M3 · Saper delegare'},
  {t:'Rispondere sempre alle stesse domande',out:'Un assistente con le risposte HR sempre aggiornate.',tappa:'M2 · Saper dare contesto'},
  {t:'Scrivere ogni volta le job description',out:'Un agente che sforna la bozza di JD dal ruolo che gli descrivi.',tappa:'M3 · Saper delegare'},
  {t:'Un posto unico per l’onboarding',out:'Un mini-portale onboarding, costruito da te.',tappa:'M4 · Saper costruire'}
 ],
 studio:[
  {t:'Cercare la norma giusta ogni volta',out:'Un agente che trova e sintetizza la norma giusta in minuti.',tappa:'M2 · Saper dare contesto'},
  {t:'Sintetizzare pratiche e sentenze lunghe',out:'Dai a Claude documenti lunghi: ti restituisce sintesi puntuali.',tappa:'M2 · Saper dare contesto'},
  {t:'Scrivere i verbali dopo ogni incontro',out:'Un agente che dalla riunione prepara il verbale formattato.',tappa:'M3 · Saper delegare'},
  {t:'Non perdere le scadenze degli adempimenti',out:'Un’automazione che ti avvisa per tempo, ogni mattina.',tappa:'M4 · Saper costruire'},
  {t:'Preparare parcelle e calcoli ricorrenti',out:'Un piccolo strumento che li calcola al posto tuo, fatto da te.',tappa:'M4 · Saper costruire'}
 ]
};
const state={step:0,role:null,roleLabel:'',pain:null,origine:null,person:null};
const stage=document.getElementById('stage');
function reveal(){stage.style.animation='none';void stage.offsetWidth;stage.style.animation='';}
function fillSlot(k,label){var s=document.querySelector('.slot[data-k="'+k+'"]');if(s&&!s.classList.contains('full')){s.classList.add('full','pop');toast(label);}}
function toast(tx){var t=document.getElementById('toast');document.getElementById('toasttx').textContent='Attrezzo conquistato: '+tx;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove('show');},2200);}
function esc(s){return (s||'').replace(/"/g,'&quot;');}
function track(p){try{var pe=state.person||{};fetch('/api/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:pe.nome||null,cognome:pe.cognome||null,email:pe.email||null,professione:pe.professione||state.roleLabel||null,ruolo:state.role,problema:p.t,tappa:p.tappa,origine:state.origine||'curato',marketing:!!pe.marketing,privacy_versione:PRIVACY_VER})}).catch(function(){});}catch(e){}}
function render(){reveal();
 if(state.step===0){stage.innerHTML='<div class="kick">La Cassetta degli AI-trezzi · Masterclass</div><h1>Componi la tua cassetta.<br>Disegna il tuo pezzo del corso.</h1><p class="lead">Non è un corso preconfezionato: lo costruiamo sui processi veri di chi partecipa. In tre mosse conquisti i tuoi tre attrezzi — e il tuo caso entra nel programma.</p><div class="row"><button class="btn" id="go">Apri la cassetta</button><span style="color:var(--muted);font-size:14px">2 minuti, tre attrezzi</span></div>'+footer();document.getElementById('go').onclick=function(){state.step=1;render();};return;}
 if(state.step===1){var h='<div class="kick">Attrezzo 1 di 3 · Il banco</div><h1>Qual è il tuo mondo?</h1><div class="grid" id="g">';ROLES.forEach(function(r){h+='<button class="choice" data-r="'+r.id+'" data-l="'+esc(r.label)+'"><b>'+r.label+'</b><span class="sub">'+r.sub+'</span></button>';});h+='<button class="choice full-w" data-r="altra" data-l="Altra professione"><b>La mia professione non è qui →</b><span class="sub">scrivila tu, costruiamo il caso su misura</span></button></div>';stage.innerHTML=h;document.querySelectorAll('#g .choice').forEach(function(b){b.onclick=function(){state.role=b.dataset.r;state.roleLabel=b.dataset.l;fillSlot(0,'Il banco');state.step=2;setTimeout(render,260);};});return;}
 if(state.step===2){
   if(state.role==='altra'){stage.innerHTML='<button class="back" id="bk">‹ indietro</button><div class="kick">Attrezzo 2 di 3 · Il problema</div><h1>Cosa ti ruba più tempo, davvero?</h1><div class="write"><div class="wh">Raccontalo a parole tue</div><textarea id="cust" placeholder="Es. ogni settimana perdo ore a… (il processo che vorresti delegare)"></textarea><button class="btn amber sm" id="custgo">Usa il mio caso</button></div>';document.getElementById('bk').onclick=function(){state.step=1;render();};document.getElementById('custgo').onclick=function(){var v=document.getElementById('cust').value.trim();if(!v){document.getElementById('cust').focus();return;}state.pain={t:v,out:'Un agente che se ne occupa al posto tuo, costruito sul tuo modo di lavorare.',tappa:'M3 · Saper delegare'};state.origine='altra-professione';fillSlot(1,'Il problema');state.step=3;setTimeout(render,260);};return;}
   var list=PAINS[state.role]||[];var h='<button class="back" id="bk">‹ indietro</button><div class="kick">Attrezzo 2 di 3 · Il problema</div><h1>Cosa ti ruba più tempo, davvero?</h1><div class="stack" id="s">';list.forEach(function(p,i){h+='<button class="choice" data-i="'+i+'"><b>'+p.t+'</b><span class="sub">'+p.tappa+'</span></button>';});h+='</div><div class="write"><div class="wh">Non è in lista? Scrivi il tuo caso a parole tue</div><textarea id="cust" placeholder="Es. ogni lunedì perdo un’ora a mettere insieme i numeri della settimana…"></textarea><button class="btn amber sm" id="custgo">Usa il mio caso</button></div>';stage.innerHTML=h;document.getElementById('bk').onclick=function(){state.step=1;render();};document.querySelectorAll('#s .choice').forEach(function(b){b.onclick=function(){state.pain=list[+b.dataset.i];state.origine='curato';fillSlot(1,'Il problema');state.step=3;setTimeout(render,260);};});document.getElementById('custgo').onclick=function(){var v=document.getElementById('cust').value.trim();if(!v){document.getElementById('cust').focus();return;}state.pain={t:v,out:'Un agente che se ne occupa al posto tuo, costruito sul tuo modo di lavorare.',tappa:'M3 · Saper delegare'};state.origine='proposto';fillSlot(1,'Il problema');state.step=3;setTimeout(render,260);};return;}
 if(state.step===3){var p=state.pain;stage.innerHTML='<button class="back" id="bk">‹ indietro</button><div class="kick">Attrezzo 3 di 3 · L’agente</div><h1>Immagina di delegarlo.</h1><div class="ba before"><div class="l">Oggi</div><div class="t">'+p.t+'</div></div><div class="arrowdn">↓</div><div class="ba after"><div class="l">Con il tuo agente</div><div class="t">'+p.out+'</div></div><div class="tappa">Lo costruiamo dal vivo nella tappa '+p.tappa+'</div><div class="row"><button class="btn" id="yes">Sì, è il mio agente</button><button class="back" id="again">prova un altro</button></div>';document.getElementById('bk').onclick=function(){state.step=2;render();};document.getElementById('again').onclick=function(){state.step=2;render();};document.getElementById('yes').onclick=function(){fillSlot(2,'L’agente');state.step=4;setTimeout(render,260);};return;}
 if(state.step===4){var pf=state.person||{};var prof=pf.professione||(state.role!=='altra'?state.roleLabel:'');stage.innerHTML='<button class="back" id="bk">‹ indietro</button><div class="kick">Ci siamo quasi</div><h1>Mettiamo il tuo nome sul caso.</h1><p class="lead">Il tuo caso entra nel programma del corso. Lascia come raggiungerti: ti teniamo il posto e ti aggiorniamo.</p><div class="two"><input class="field" id="nome" placeholder="Nome" value="'+esc(pf.nome)+'"><input class="field" id="cognome" placeholder="Cognome" value="'+esc(pf.cognome)+'"></div><input class="field" id="prof" placeholder="La tua professione" value="'+esc(prof)+'" style="margin-top:10px"><input class="field" id="email" type="email" placeholder="La tua email" value="'+esc(pf.email)+'" style="margin-top:10px"><div class="consent"><label class="ck"><input type="checkbox" id="c1"><span>Ho letto l’<a href="privacy.html" target="_blank" rel="noopener">informativa privacy</a> e acconsento al trattamento dei miei dati per partecipare alla co-progettazione del corso ed essere ricontattato/a in merito.</span></label><label class="ck"><input type="checkbox" id="c2"><span>Acconsento a ricevere via email aggiornamenti sul corso e contenuti collegati. <span class="opt">(facoltativo)</span></span></label></div><div class="err" id="err"></div><div class="row"><button class="btn" id="go4">Entra nel programma</button></div>'+footer();document.getElementById('bk').onclick=function(){state.step=3;render();};document.getElementById('go4').onclick=function(){var n=document.getElementById('nome').value.trim(),c=document.getElementById('cognome').value.trim(),pr=document.getElementById('prof').value.trim(),e=document.getElementById('email').value.trim();var okmail=/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e);var er=document.getElementById('err');if(!n||!c){er.textContent='Scrivi nome e cognome.';er.style.display='block';return;}if(!pr){er.textContent='Scrivi la tua professione.';er.style.display='block';return;}if(!okmail){er.textContent='Controlla la mail: sembra incompleta.';er.style.display='block';return;}if(!document.getElementById('c1').checked){er.textContent='Per procedere serve il consenso al trattamento dei dati.';er.style.display='block';return;}state.person={nome:n,cognome:c,professione:pr,email:e,marketing:document.getElementById('c2').checked};track(state.pain);state.step=5;render();};return;}
 if(state.step===5){var p=state.pain;var who=state.person&&state.person.nome?state.person.nome:'';stage.innerHTML='<div class="medalwrap"><div class="medal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div></div><div class="kick" style="text-align:center">Cassetta completa</div><h1 style="text-align:center">'+(who?who+', il tuo caso è nel programma.':'Il tuo caso è nel programma.')+'</h1><p class="lead" style="text-align:center">«'+p.out+'» è ora parte del corso che costruiamo insieme. Lo ritroverai in aula, nella tappa '+p.tappa+', e ne uscirai con il tuo agente che lo fa davvero.</p><div class="card-soft"><div class="quote">Le 40 ore prendono forma anche grazie a te.</div><div style="font-size:15px;color:var(--muted);margin-top:8px" id="tg">Altri come te stanno componendo la loro cassetta. È questo il senso: un corso cucito sui vostri processi, non lo stesso copione per tutti.</div></div><div class="row" style="justify-content:center"><button class="btn amber" id="end">Ci vediamo in aula</button><button class="back" id="more">Aggiungi un altro caso</button></div>'+footer();confetti();document.getElementById('more').onclick=function(){state.step=2;render();};document.getElementById('end').onclick=function(){document.getElementById('tg').textContent='Perfetto. Custodiamo noi il tuo caso — a settembre lo costruiamo insieme.';confetti();};return;}
